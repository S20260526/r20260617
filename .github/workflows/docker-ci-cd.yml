name: cicd

on:
  push:
    branches: [ "main" ]

  pull_request:
    branches: [ "main" ]

  workflow_dispatch:
    branches: [ "main" ]

jobs:
  localhost:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.20"
      - name: fmt
        run: test "$(gofmt -l ./internal/app ./cmd ./internal/domain ./internal/infra | wc -l)" -eq "0"
      - name: lint
        run: go vet ./internal/app ./cmd ./internal/domain ./internal/infra
      - name: unittest
        run: go test -v ./internal/app ./internal/domain ./internal/infra
      - name: build
        run: go build ./cmd
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          file: Dockerfile
          push: true
          tags: ghcr.io/s20260526/m20260618:latest
